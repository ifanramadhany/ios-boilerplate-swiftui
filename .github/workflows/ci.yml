name: iOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  quality-and-build:
    name: Quality and Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install swiftlint swiftformat

      - name: Check formatting
        run: make format-check

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Build for testing
        run: make test-build
